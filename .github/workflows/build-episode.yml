name: Build episode

on:
  schedule:
    - cron: '0 4 * * *'
  push:
    paths:
      - 'briefs/*.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-episode
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gather brief data
        run: python scripts/gather_brief.py

      - name: Build episode
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/build_episode.py

      - name: Commit and push
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "bot@morning-brief.local"
          git add briefs/ episodes/ feed.xml || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Episode for $(date -u +%Y-%m-%d)"
            git push
          fi
