name: Build episode

on:
  schedule:
    # 04:00 UTC = 07:00 Israel summer time (IDT). In winter (IST), this fires at 06:00 local.
    - cron: '0 4 * * *'
  push:
    paths:
      - 'briefs/*.json'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-episode
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Gather today's brief data (idempotent — skips if file exists)
        run: python scripts/gather_brief.py

      - name: Build episode (TTS + feed update)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/build_episode.py

      - name: Commit and push
        run: |
          git